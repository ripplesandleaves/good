name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate skill files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/validate-skills.py

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null && echo "✓ plugin.json"
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null && echo "✓ marketplace.json"

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx markdownlint-cli 'skills/**/*.md' '*.md'
